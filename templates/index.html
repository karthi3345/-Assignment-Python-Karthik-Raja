<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Chatbot</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

<div class="container py-5">

    <h2 class="text-center mb-4">
        🤖 AI Chatbot
    </h2>
    <button class="btn btn-danger mb-3" onclick="clearAll()">
    🗑️ Clear All (Chat + Image + Vision)
</button>

    <ul class="nav nav-tabs">

        <li class="nav-item">
            <button class="nav-link active"
                    data-bs-toggle="tab"
                    data-bs-target="#chat">
                Chat
            </button>
        </li>

        <li class="nav-item">
            <button class="nav-link"
                    data-bs-toggle="tab"
                    data-bs-target="#image">
                Image
            </button>
        </li>

        <li class="nav-item">
            <button class="nav-link"
                    data-bs-toggle="tab"
                    data-bs-target="#vision">
                Vision
            </button>
        </li>

    </ul>

    <div class="tab-content border p-4">

        <!-- CHAT -->

        <div class="tab-pane fade show active" id="chat">

            <textarea
                    id="chatMessage"
                    class="form-control mb-3"
                    rows="3"
                    placeholder="Ask anything..."></textarea>

            <button
                    class="btn btn-primary"
                    onclick="sendChat()">
                Send
            </button>

            <pre id="chatResult" class="mt-3"></pre>

        </div>

        <!-- IMAGE -->

        <div class="tab-pane fade" id="image">

            <input
                    class="form-control mb-3"
                    id="imagePrompt"
                    placeholder="Image Prompt">

            <button
                    class="btn btn-success"
                    onclick="generateImage()">
                Generate
            </button>

            <img
                    id="generatedImage"
                    class="img-fluid mt-4"/>

        </div>

        <!-- VISION -->

        <div class="tab-pane fade" id="vision">

            <input
                    type="file"
                    class="form-control mb-3"
                    id="visionImage">

            <input
                    class="form-control mb-3"
                    id="visionQuestion"
                    placeholder="Ask about image">

            <button
                    class="btn btn-warning"
                    onclick="analyzeImage()">
                Analyze
            </button>

            <pre id="visionResult" class="mt-3"></pre>

        </div>

    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script src="/static/script.js"></script>

</body>
</html>
